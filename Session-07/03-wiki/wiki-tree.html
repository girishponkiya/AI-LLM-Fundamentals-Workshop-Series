<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Session 7 — Wiki</title>
<style>
  :root{--ink:#0F172A;--teal:#0F766E;--muted:#64748B;--line:#E2E8F0;--bg:#F8FAFC;--tint:#F0FDFA}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1E293B;background:var(--bg)}
  .wrap{max-width:760px;margin:0 auto;padding:34px 22px 70px}
  .kicker{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--teal);text-transform:uppercase}
  h1{font-family:Cambria,Georgia,serif;color:var(--ink);font-size:30px;margin:6px 0 4px}
  p.lead{color:var(--muted);margin:0 0 22px}
  a.page{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);
         border-radius:12px;padding:14px 18px;margin:10px 0;text-decoration:none;color:#1E293B;
         box-shadow:0 4px 12px rgba(100,116,139,.07);transition:transform .12s,box-shadow .12s}
  a.page:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(100,116,139,.14)}
  .num{font-family:Cambria,serif;font-weight:700;color:var(--teal);font-size:18px;flex:0 0 28px}
  .t{font-weight:600}
  .d{color:var(--muted);font-size:13px;margin-top:1px}
  .grow{flex:1}
  .chev{color:#CBD5E1}
  .ov{background:var(--tint);border-color:#99F6E4}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">AI &amp; LLM Fundamentals · Session 7</div>
  <h1>Wiki — Application Development &amp; Tool Integration</h1>
  <p class="lead">Reference pages. Full backing research in <code>../01-research/</code>.</p>
  <div id="list"></div>
</div>
<script>
  const pages = [
    ["00","00-overview.md","Overview","The spine, the thread, where S7 sits",true],
    ["01","01-structured-output.md","Layer 1 — Structured output","The contract problem; shape ≠ truth"],
    ["02","02-tool-calling.md","Layer 2 — Tool / function calling","Decision vs execution layer; ReAct → function calling"],
    ["03","03-retrieval-rag.md","Layer 3 — Retrieval (RAG)","Why a question ≠ its answer; the stack of fixes"],
    ["04","04-orchestration-loop.md","Layer 4 — Orchestration","The loop; ReAct vs plan-and-execute"],
    ["05","05-mcp.md","MCP","USB-C/LSP; handshake → discovery → call; Copilot as host"],
    ["★","glossary.md","Glossary","Every term in one place"]
  ];
  document.getElementById("list").innerHTML = pages.map(p=>`
    <a class="page ${p[4]?'ov':''}" href="${p[1]}">
      <span class="num">${p[0]}</span>
      <span class="grow"><span class="t">${p[2]}</span><div class="d">${p[3]}</div></span>
      <span class="chev">→</span>
    </a>`).join("");
</script>
</body>
</html>
